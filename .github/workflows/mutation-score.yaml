on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

name: mutation-score.yaml

permissions:
  contents: write

jobs:
  mutation-score:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgbuild, local::.
          needs: check
          dependencies: 'c("Depends", "Imports", "LinkingTo", "Suggests")'
          install-pandoc: false

      - name: Run mutator on itself
        run: source(".github/scripts/mutation-score.R")
        shell: Rscript {0}

      - name: Upload mutation score artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-score
          path: mutation-results

      - name: Deploy mutation score badge data
        if: always() && github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          clean: false
          branch: gh-pages
          folder: mutation-results
