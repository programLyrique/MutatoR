# mutator's own mutation-testing CI. It exercises the reusable workflow
# (mutation-testing.yaml) on this package on every push/PR, so the workflow is
# continuously validated on a real R package before it is tagged for release.
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

name: mutation-score.yaml

jobs:
  mutation-score:
    permissions:
      contents: write
    uses: ./.github/workflows/mutation-testing.yaml
    with:
      # Install mutator from this checkout rather than from GitHub.
      mutator-spec: local::.
      target-margin: "0.10"
      isolate: true
      deploy-badge: true
      artifact-name: mutation-score
