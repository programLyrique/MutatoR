name: mutation-system-tests

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions: read-all

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [R.methodsS3, forcats, jsonlite, lumberjack, nanotime, oRaklE, prettyunits, scales, stringr]
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::remotes, github::PRL-PRG/imputesrcref@fix-r-4-6-public-c-api
          needs: check
          dependencies: 'c("Depends", "Imports", "LinkingTo", "Suggests")'
      - uses: actions/cache@v4
        with:
          path: packages/system
          key: mutation-system-${{ runner.os }}-${{ hashFiles('tests/system/fixtures.R') }}
      - name: Restore fixture and dependencies
        run: Rscript tests/system/bootstrap.R --install-deps --packages=${{ matrix.package }}
      - name: Run mutation snapshot
        run: Rscript tests/system/run.R --no-bootstrap --packages=${{ matrix.package }}

  full:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::remotes, github::PRL-PRG/imputesrcref@fix-r-4-6-public-c-api
          needs: check
          dependencies: 'c("Depends", "Imports", "LinkingTo", "Suggests")'
      - uses: actions/cache@v4
        with:
          path: packages/system
          key: mutation-system-${{ runner.os }}-${{ hashFiles('tests/system/fixtures.R') }}
      - name: Restore fixtures and dependencies
        run: Rscript tests/system/bootstrap.R --install-deps
      - name: Run full mutation snapshots
        run: Rscript tests/system/run.R --no-bootstrap --profile=full
