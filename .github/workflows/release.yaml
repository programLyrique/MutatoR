# Build the package tarball with `R CMD build` and attach it to the GitHub
# release. Runs automatically when a release is published, and can be run
# manually against an existing tag/release via workflow_dispatch (e.g. to
# backfill assets on releases created before this workflow existed).
name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag of an existing release to build and attach the tarball to.
        type: string
        required: true

permissions:
  contents: write

jobs:
  build-tarball:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: echo "tag=${{ github.event.inputs.tag || github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, github::PRL-PRG/imputesrcref
          needs: check
          dependencies: 'c("Depends", "Imports", "LinkingTo", "Suggests")'

      - name: Build source tarball
        run: R CMD build --compact-vignettes=gs+qpdf .

      - name: Upload tarball to release
        shell: bash
        run: |
          tarball=$(ls mutator_*.tar.gz | head -n1)
          echo "Attaching $tarball to release ${{ steps.tag.outputs.tag }}"
          gh release upload "${{ steps.tag.outputs.tag }}" "$tarball" --clobber
